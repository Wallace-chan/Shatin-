# 每天 HKT 08:00、12:00、18:00：小紅書 / Instagram / Facebook 統一粵語帖文
name: Shatin social posts

on:
  schedule:
    - cron: "0 0 * * *"   # 08:00 HKT
    - cron: "0 4 * * *"   # 12:00 HKT
    - cron: "0 10 * * *"  # 18:00 HKT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Generate social posts
        run: python generate_social_posts.py

      - name: Commit state (去重 hash)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/social_state.json
          git diff --staged --quiet || git commit -m "chore: update social post state [skip ci]"
          git push

      - name: Upload posts
        uses: actions/upload-artifact@v4
        with:
          name: shatin-social-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 30
