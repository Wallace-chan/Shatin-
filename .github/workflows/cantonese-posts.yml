# 每天 HKT 08:05、12:05、18:05：粵語口語帖文
name: Shatin cantonese posts

on:
  schedule:
    - cron: "5 0 * * *"
    - cron: "5 4 * * *"
    - cron: "5 10 * * *"
  workflow_dispatch:

concurrency:
  group: shatin-cantonese-posts-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Generate cantonese posts
        run: python generate_cantonese_posts.py

      - name: Commit state (schedule only)
        if: github.event_name == 'schedule'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cantonese_state.json
          if git diff --staged --quiet; then
            echo "No cantonese_state.json changes."
          else
            git commit -m "chore: update cantonese post state [skip ci]"
          fi
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}" && break
            sleep 10
          done

      - uses: actions/upload-artifact@v4
        with:
          name: shatin-cantonese-${{ github.run_number }}-${{ github.event_name }}
          path: output/
          if-no-files-found: error
          retention-days: 30
